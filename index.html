<!DOCTYPE html>
<html>
<head>
  <title>Expense Tracker Pro</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
    }

    input, select {
      padding: 12px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #0f172a;
      color: white;
    }

    button {
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      margin: 5px;
      font-weight: bold;
    }

    .primary {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
    }

    .danger {
      background: linear-gradient(90deg, #ef4444, #dc2626);
      color: white;
    }

    .expense {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<div class="header">
  💰 Expense Tracker Pro
</div>

<div class="container">

<div class="card">
  <button class="primary" onclick="connectWallet()">Connect</button>
  <button class="danger" onclick="disconnectWallet()">Disconnect</button>
  <p id="status"></p>
</div>

<div class="card">
  <input type="number" id="amount" placeholder="Amount">
  <select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Bills</option>
    <option>Shopping</option>
  </select>

  <input type="text" id="note" placeholder="Note">

  <label>
    <input type="checkbox" id="publicToggle"> Public
  </label>

  <button class="primary" onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
  <p>Total: <span id="total">0</span></p>
  <p>Transactions: <span id="count">0</span></p>
</div>

<div class="card">
  <button onclick="loadMy()">My Expenses</button>
  <button onclick="loadPublic()">Public</button>
</div>

<div class="card">
  <div id="list"></div>
</div>

<div class="card">
  <button class="danger" onclick="withdraw()">Withdraw</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

<script>

let provider;
let signer;
let contract;

const contractAddress = "0x295d3f81be8539391ad0b2d289695d9f261fec55";

const abi = [
  "function addExpense(uint,string,string,bool) payable",
  "function getMyExpenses() view returns (tuple(uint amount,string category,string note,bool isPublic,uint timestamp)[])",
  "function getPublicExpenses() view returns (tuple(uint amount,string category,string note,bool isPublic,uint timestamp)[])",
  "function deleteExpense(uint)",
  "function getTotalSpent() view returns (uint)",
  "function getExpenseCount() view returns (uint)",
  "function withdraw()"
];

async function connectWallet() {
  try {
    if (!window.ethereum) return alert("Install MetaMask");

    provider = new ethers.BrowserProvider(window.ethereum);

    await window.ethereum.request({ method: "eth_requestAccounts" });

    signer = await provider.getSigner();

    contract = new ethers.Contract(contractAddress, abi, signer);

    document.getElementById("status").innerText = "Connected ✅";

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error ❌";
  }
}

function disconnectWallet() {
  contract = null;
  signer = null;
  provider = null;
  document.getElementById("status").innerText = "Disconnected ❌";
}

async function addExpense() {
  try {
    const amountVal = document.getElementById("amount").value;
    const categoryVal = document.getElementById("category").value;
    const noteVal = document.getElementById("note").value;
    const isPublicVal = document.getElementById("publicToggle").checked;

    const tx = await contract.addExpense(
      amountVal,
      categoryVal,
      noteVal,
      isPublicVal,
      { value: "100000000000000" }
    );

    await tx.wait();

    document.getElementById("status").innerText = "Saved ✅";

    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";

    loadMy();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error ❌";
  }
}

async function loadMy() {
  const data = await contract.getMyExpenses();
  let html = "";

  data.forEach((e, i) => {
    const date = new Date(Number(e.timestamp) * 1000).toLocaleString();

    html += `
      <div class="expense">
        💰 ${e.amount} — ${e.category}
        <br>${e.note}
        <br>${date}
        <br>${e.isPublic ? "Public" : "Private"}
        <br><button onclick="del(${i})">Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;

  const total = await contract.getTotalSpent();
  document.getElementById("total").innerText = total;

  const count = await contract.getExpenseCount();
  document.getElementById("count").innerText = count;
}

async function loadPublic() {
  const data = await contract.getPublicExpenses();
  let html = "";

  data.forEach(e => {
    const date = new Date(Number(e.timestamp) * 1000).toLocaleString();

    html += `
      <div class="expense">
        💰 ${e.amount} — ${e.category}
        <br>${e.note}
        <br>${date}
        <br>Public
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

async function del(i) {
  const tx = await contract.deleteExpense(i);
  await tx.wait();
  loadMy();
}

async function withdraw() {
  const tx = await contract.withdraw();
  await tx.wait();
  document.getElementById("status").innerText = "Withdrawn 💸";
}

</script>

</body>
</html>
